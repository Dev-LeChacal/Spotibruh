name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"

      - name: Create .env
        run: echo "CLIENT_ID=${{ secrets.CLIENT_ID }}" > .env

      - name: Clone spotify-dart
        run: git clone -b fix/playlist-tracks https://github.com/Dev-LeChacal/spotify-dart.git packages/spotify-dart

      - run: flutter pub get

      - run: flutter build apk --release --flavor prod --split-per-abi

      - uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-prod-arm64-v8a-release.apk
