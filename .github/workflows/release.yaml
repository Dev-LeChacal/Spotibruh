name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            build/
            packages/spotify-dart
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          cache: true

      - name: Clone spotify-dart
        run: git clone -b fix/playlist-tracks https://github.com/Dev-LeChacal/spotify-dart.git packages/spotify-dart

      - run: flutter pub get

      - run: flutter build apk --release --flavor prod --target-platform android-arm64 --dart-define=CLIENT_ID=${{ secrets.CLIENT_ID }}

      - uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-arm64-v8a-prod-release.apk
