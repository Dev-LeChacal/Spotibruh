name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"

      - run: flutter pub get

      - run: flutter build apk --release --flavor prod --split-per-abi
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}

      - uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-prod-arm64-v8a-release.apk
