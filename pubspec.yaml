name: spotibruh
description: ""
publish_to: "none"
version: 2.0.4+4

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  app_links: ^7.0.0
  audio_service: ^0.18.18
  cached_network_image: ^3.4.1
  crypto: ^3.0.7
  flutter_secure_storage: ^10.2.0
  go_router: ^17.1.0
  http: ^1.6.0
  palette_generator_master: ^1.1.0
  path_provider: ^2.1.5
  skeletonizer: ^2.1.3
  url_launcher: ^6.3.2
  vibration: ^3.1.8
  media_kit_libs_audio: ^1.0.7

  media_kit:
    git:
      url: https://github.com/realmeylisdev/media-kit.git
      ref: fix/hot-restart-crash
      path: media_kit

  spotify:
    git:
      url: https://github.com/Dev-LeChacal/spotify-dart.git
      ref: fix/playlist-tracks

  youtube_explode_dart: ^3.1.0
  youtube_explode_webview: ^0.0.2
  marquee: ^2.3.0
  audio_session: ^0.2.3
  flutter_animate: ^4.5.2
  hugeicons_pro: ^0.0.3
  oauth2: ^2.0.5
  hive_flutter: ^1.1.0
  webview_flutter: ^4.13.1
  webview_cookie_manager_plus: ^2.0.17
  internet_connection_checker_plus: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: SNPro
      fonts:
        - asset: assets/fonts/SNPro-Light.ttf
          weight: 300
        - asset: assets/fonts/SNPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/SNPro-Medium.ttf
          weight: 500
        - asset: assets/fonts/SNPro-Semibold.ttf
          weight: 600
        - asset: assets/fonts/SNPro-Bold.ttf
          weight: 700
        - asset: assets/fonts/SNPro-Black.ttf
          weight: 800
